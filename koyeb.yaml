# Koyeb Service Configuration for Octavia Interview Buddy
# Includes both backend web service and PostgreSQL database service

# Application configuration
application:
  name: octavia-interview-buddy
  region: us-east-1

# Services configuration
services:
  # Database Service
  - name: octavia-postgres
    type: database
    database:
      engine: postgresql
      version: "15"
      instance_type: "standard-2x"  # 2 vCPUs, 4GB RAM
      disk_size: 20  # GB storage
      backup_retention_days: 7
      enable_point_in_time_recovery: true
      enable_encryption: true
    env:
      - name: POSTGRES_DB
        value: octavia_interview_buddy
      - name: POSTGRES_USER
        secret: postgres-user
      - name: POSTGRES_PASSWORD
        secret: postgres-password
    scaling:
      min: 1
      max: 3
      metrics:
        - type: cpu
          target: 70
        - type: memory
          target: 80
    
  # Backend Web Service
  - name: octavia-backend
    type: web
    source:
      type: git
      git:
        url: .  # Using local repository
        branch: main
    builder: buildpacks
    buildpacks:
      - heroku/nodejs
    run_command: cd backend && npm start
    env:
      - name: NODE_ENV
        value: production
      - name: PORT
        value: 8080
      # Database connection - will be updated after database deployment
      - name: KOYEB_DATABASE_URL
        value: "postgresql://octavia_db_user:PLACEHOLDER_PASSWORD@octavia-postgres:5432/octavia_interview_buddy?sslmode=require"
      - name: DATABASE_URL
        value: "postgresql://octavia_db_user:PLACEHOLDER_PASSWORD@octavia-postgres:5432/octavia_interview_buddy?sslmode=require"
      - name: FIREBASE_PRIVATE_KEY
        secret: firebase-private-key
      - name: FIREBASE_CLIENT_EMAIL
        secret: firebase-client-email
      - name: STRIPE_SECRET_KEY
        secret: stripe-secret-key
      - name: BREVO_API_KEY
        secret: brevo-api-key
    ports:
      - port: 8080
        protocol: http
    routes:
      - path: /
        port: 8080
    health_checks:
      - type: http
        path: /api/health
        interval: 30s
        timeout: 10s
        success_threshold: 1
        failure_threshold: 3
    scaling:
      min: 1
      max: 1  # Start with 1, can scale later
      metrics:
        - type: cpu
          target: 70
        - type: memory
          target: 70